# Layer 1: Lint (Ruff) + Layer 2: Test + Build
name: CI

on:
  pull_request:
    branches: [staging, main, feat/v1-mvp]
  workflow_dispatch:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Test
        run: pytest syllabus/tests -v

      - name: Build
        run: python -m build
