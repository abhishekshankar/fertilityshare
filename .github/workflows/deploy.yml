# Deploy backend to Railway and frontend to Vercel on push to main.
# Secrets: RAILWAY_TOKEN, RAILWAY_SERVICE_ID, VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy backend (Railway)
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
            RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Railway secrets
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "::error::Missing GitHub secrets. In repo Settings → Secrets and variables → Actions, add RAILWAY_TOKEN and RAILWAY_SERVICE_ID (from Railway project → Settings → Tokens / service URL)."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service $RAILWAY_SERVICE_ID --detach

  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env
        working-directory: web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        working-directory: web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        working-directory: web
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
